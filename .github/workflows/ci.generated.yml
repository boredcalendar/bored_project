name: CI
on:
  push:
    branches:
      - main
  pull_request: {}
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install
      - name: Check generated workflows are in sync
        run: |-
          for f in .github/workflows/*.main.ts; do node "$f"; done
          git diff --exit-code .github/workflows/
      - run: vp check
      - run: vp run test
      - run: vp run build
